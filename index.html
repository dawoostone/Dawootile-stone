<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F6E56">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>다우세라믹앤석재 통합관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --g:#1D9E75; --gd:#0F6E56; --gdd:#0A4F3E; --gl:#E1F5EE; --gl2:#EFF9F5; --gbd:#9FE1CB;
  --amber:#EF9F27; --amber-bg:#FDF3E0; --amber-t:#8A560B; --amber-bd:#F2D9A6;
  --red:#E24B4A; --red-bg:#FDECEC; --red-t:#9E2B2B; --red-bd:#F5C9C9;
  --blue:#2F7DB8; --blue-bg:#E9F2FA; --blue-t:#1B5285; --blue-bd:#BFDBF0;
  --lime:#639922; --lime-bg:#EFF6E2; --lime-t:#3B6D11;
  --bg:#EEF2F0; --card:#FFFFFF; --soft:#F3F6F4;
  --t1:#16201D; --t2:#566661; --t3:#8C9A95;
  --bd:#E3E9E6; --bd2:#CDD6D2;
  --r:11px; --rl:16px; --rs:8px;
  --sh:0 1px 2px rgba(16,40,33,.05),0 2px 8px rgba(16,40,33,.05);
  --sh2:0 4px 16px rgba(16,40,33,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.45;overflow-x:hidden;-webkit-text-size-adjust:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
.hidden{display:none!important}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

/* ===== Login ===== */
#login{position:fixed;inset:0;background:radial-gradient(120% 120% at 50% 0%,#1D9E75 0%,#0F6E56 55%,#0A4F3E 100%);display:flex;align-items:center;justify-content:center;padding:24px;z-index:100}
.login-box{background:#fff;border-radius:22px;padding:32px 26px;width:100%;max-width:360px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:11px;margin-bottom:24px}
.login-logo .ico{width:60px;height:60px;background:linear-gradient(150deg,#1D9E75,#0A4F3E);border-radius:17px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:31px;box-shadow:0 8px 18px rgba(15,110,86,.35)}
.login-logo h1{font-size:19px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.login-logo p{font-size:12px;color:var(--t3)}
.member-list{display:flex;flex-direction:column;gap:8px;max-height:248px;overflow-y:auto}
.member-btn{display:flex;align-items:center;gap:11px;padding:12px 14px;border:1.5px solid var(--bd);border-radius:var(--r);background:#fff;text-align:left;font-size:14.5px;font-weight:500;transition:.15s}
.member-btn:hover{border-color:var(--g);background:var(--gl2)}
.member-btn .av{width:34px;height:34px;border-radius:50%;background:var(--gl);color:var(--gd);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.member-btn .role{margin-left:auto;font-size:11px;color:var(--t3);font-weight:500}
.pin-area{text-align:center}
.pin-dots{display:flex;justify-content:center;gap:13px;margin:20px 0}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--bd2);transition:.1s}
.pin-dot.on{background:var(--g);border-color:var(--g);transform:scale(1.05)}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.key{padding:15px 0;border:1px solid var(--bd);border-radius:var(--r);background:#fff;font-size:21px;font-weight:600;color:var(--t1)}
.key:active{background:var(--soft);transform:scale(.97)}
.key.fn{font-size:14px;color:var(--t2);font-weight:500}
.login-err{color:var(--red-t);font-size:12px;min-height:17px;margin-top:8px}
.lf-fld{text-align:left;margin-bottom:13px}
.lf-fld label{display:block;font-size:12px;color:var(--t2);font-weight:600;margin-bottom:5px}
.lf-fld input{width:100%;font-size:16px;padding:12px 13px;border:1.5px solid var(--bd2);border-radius:11px;box-sizing:border-box;background:#fff}
.lf-fld input:focus{border-color:var(--g);outline:none}
.lf-remember{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--t2);margin:2px 0 11px;cursor:pointer;text-align:left;user-select:none}
.lf-remember input{width:16px;height:16px;accent-color:var(--g);margin:0}
.link-btn{color:var(--gd);font-size:12.5px;text-decoration:underline;margin-top:12px}

/* ===== Shell ===== */
#app{display:none;min-height:100%;padding-bottom:74px}
.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(120deg,#0F6E56,#127C61);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(10,79,62,.18)}
.tb-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15.5px;letter-spacing:-.2px}
.tb-logo .ico{width:32px;height:32px;background:rgba(255,255,255,.16);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.tb-logo small{display:block;font-size:10px;color:rgba(255,255,255,.72);font-weight:500;margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px}
.sync-dot{display:flex;align-items:center;gap:5px;font-size:11px;color:#fff;padding:5px 10px;background:rgba(255,255,255,.15);border-radius:20px;font-weight:500}
.sync-dot .d{width:7px;height:7px;border-radius:50%;background:#7BEFC6;box-shadow:0 0 0 0 rgba(123,239,198,.7);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(123,239,198,.6)}70%{box-shadow:0 0 0 6px rgba(123,239,198,0)}100%{box-shadow:0 0 0 0 rgba(123,239,198,0)}}
.sync-dot.local .d{background:#FAC775;animation:none}
.tb-user{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#fff;font-weight:500}
.tb-user .av{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.22);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px}

.wrap{max-width:940px;margin:0 auto;padding:15px 14px 8px}
@media(min-width:760px){ .wrap{padding:20px} }

.botnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bd);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 12px rgba(16,40,33,.06)}
.nav-i{flex:1;padding:9px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--t3);font-size:10.5px;font-weight:500;position:relative}
.nav-i i{font-size:22px}
.nav-i.active{color:var(--gd);font-weight:700}
.nav-i.active i{color:var(--g)}
.nav-i.active::before{content:"";position:absolute;top:0;width:30px;height:3px;border-radius:0 0 3px 3px;background:var(--g)}

.page{display:none;animation:fade .2s}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px}
.ph h2{font-size:19px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:8px}
.ph h2 i{color:var(--g);font-size:21px}
.ph p{font-size:12px;color:var(--t3);margin-top:2px}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:16px}
@media(min-width:640px){ .stat-grid{grid-template-columns:repeat(4,1fr)} }
.stat{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:15px;box-shadow:var(--sh);position:relative;overflow:hidden}
.stat .ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px}
.stat .v{font-size:27px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat .l{font-size:12.5px;color:var(--t2);margin-top:4px;font-weight:500}
.stat .s{font-size:11px;color:var(--t3);margin-top:3px}
.stat.tap{cursor:pointer;text-align:left;width:100%;font:inherit;display:block}
.stat.tap:active{transform:scale(.985)}
.stat .l .tap-arrow{font-size:13px;color:var(--t3);vertical-align:-2px;margin-left:1px}
.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--bd2);border-radius:var(--r);padding:0 12px;margin-bottom:12px}
.search-box:focus-within{border-color:var(--g);box-shadow:0 0 0 3px var(--gl)}
.search-box > i{font-size:18px;color:var(--t3)}
.search-box input{flex:1;border:none;outline:none;background:none;font-size:15px;padding:11px 0;color:var(--t1)}
.search-box .search-x{color:var(--t3);font-size:18px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.search-box .search-x:active{background:var(--soft)}
.ic.g{background:var(--gl);color:var(--gd)}
.ic.r{background:var(--red-bg);color:var(--red-t)}
.ic.a{background:var(--amber-bg);color:var(--amber-t)}
.ic.b{background:var(--blue-bg);color:var(--blue-t)}

.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;box-shadow:var(--sh);margin-bottom:14px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.card-h h3{font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:7px}
.card-h h3 i{color:var(--g);font-size:18px}
.card-h .more{font-size:12px;color:var(--gd);font-weight:600;display:flex;align-items:center;gap:2px}

.alert-i{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--r);margin-bottom:8px;border:1px solid var(--bd)}
.alert-i:last-child{margin-bottom:0}
.alert-i.r{background:var(--red-bg);border-color:var(--red-bd)}
.alert-i.a{background:var(--amber-bg);border-color:var(--amber-bd)}
.alert-i.b{background:var(--blue-bg);border-color:var(--blue-bd)}
.alert-i .ai{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;background:#fff}
.alert-i.r .ai{color:var(--red-t)} .alert-i.a .ai{color:var(--amber-t)} .alert-i.b .ai{color:var(--blue-t)}
.alert-i .at{flex:1;min-width:0}
.alert-i .at b{font-size:13px;font-weight:700;display:block;color:var(--t1)}
.alert-i .at span{font-size:11.5px;color:var(--t2)}
.alert-i .tag{font-size:11px;padding:4px 10px;border-radius:20px;white-space:nowrap;font-weight:700;background:#fff}
.alert-i.r .tag{color:var(--red-t)} .alert-i.a .tag{color:var(--amber-t)} .alert-i.b .tag{color:var(--blue-t)}

.qa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:640px){ .qa-grid{grid-template-columns:repeat(4,1fr)} }
.qa{display:flex;align-items:center;gap:11px;padding:13px;border:1px solid var(--bd);border-radius:var(--r);background:var(--card);text-align:left;box-shadow:var(--sh)}
.qa:active{background:var(--soft);transform:scale(.98)}
.qa .qi{font-size:20px;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qa b{font-size:13px;font-weight:700;display:block}
.qa small{font-size:11px;color:var(--t3)}

.pill{font-size:11px;padding:4px 10px;border-radius:20px;white-space:nowrap;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.p-prog{background:var(--gl);color:var(--gd)}
.p-wait{background:var(--amber-bg);color:var(--amber-t)}
.p-done{background:var(--lime-bg);color:var(--lime-t)}
.p-issue{background:var(--red-bg);color:var(--red-t)}
.p-hold{background:var(--blue-bg);color:var(--blue-t)}
.p-gray{background:var(--soft);color:var(--t2)}

.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:13px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{font-size:12.5px;padding:7px 14px;border:1px solid var(--bd);border-radius:20px;background:#fff;color:var(--t2);white-space:nowrap;font-weight:600}
.chip.active{background:var(--g);color:#fff;border-color:var(--g)}

.site-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:700px){ .site-grid{grid-template-columns:1fr 1fr} }
.site{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:15px;box-shadow:var(--sh);cursor:pointer;transition:.15s}
.site:active{transform:scale(.995)}
.site-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:11px}
.site-top .nm{font-size:15.5px;font-weight:700;letter-spacing:-.2px}
.site-top .ad{font-size:12px;color:var(--t2);margin-top:3px;display:flex;align-items:center;gap:4px}
.site-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin:11px 0}
.mi{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--t2);min-width:0}
.mi i{font-size:16px;color:var(--g);flex-shrink:0;width:18px;text-align:center}
.mi b{color:var(--t1);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mi .k{color:var(--t3);font-weight:500}
.date-row{display:flex;gap:10px;margin:11px 0}
.date-row .db{flex:1;background:var(--soft);border-radius:var(--rs);padding:8px 11px}
.date-row .db .k{font-size:10.5px;color:var(--t3);font-weight:600}
.date-row .db .v{font-size:13.5px;font-weight:700;margin-top:1px}
.date-row .db.soon{background:var(--amber-bg)} .date-row .db.soon .v{color:var(--amber-t)}

/* date timeline */
.tline{display:flex;align-items:flex-start;margin-top:13px;border-top:1px solid var(--bd);padding-top:13px}
.tnode{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;text-align:center}
.tnode::before{content:"";position:absolute;top:8px;left:-50%;width:100%;height:2.5px;background:var(--bd);z-index:0}
.tnode:first-child::before{display:none}
.tnode.done::before,.tnode.cur::before{background:var(--g)}
.tnode.skip::before{background:repeating-linear-gradient(90deg,var(--bd) 0 4px,transparent 4px 8px)}
.tnode .c{width:17px;height:17px;border-radius:50%;background:#fff;border:2.5px solid var(--bd2);z-index:1;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}
.tnode.done .c{background:var(--g);border-color:var(--g)}
.tnode.cur .c{background:#fff;border-color:var(--g);box-shadow:0 0 0 3px var(--gl)}
.tnode.cur .c::after{content:"";width:7px;height:7px;border-radius:50%;background:var(--g)}
.tnode.skip .c{border-style:dashed}
.tnode .lb{font-size:10px;color:var(--t3);font-weight:600;line-height:1.2}
.tnode.done .lb,.tnode.cur .lb{color:var(--t1)}
.tnode .dt{font-size:9px;color:var(--t3);line-height:1}

.tbl-wrap{overflow-x:auto;border:1px solid var(--bd);border-radius:var(--rl);background:#fff;box-shadow:var(--sh)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:11px 12px;font-size:11px;font-weight:700;color:var(--t2);background:var(--soft);border-bottom:1px solid var(--bd);white-space:nowrap}
.tbl td{padding:12px;border-bottom:1px solid var(--bd);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:active{background:var(--gl2)}

.bar{height:7px;background:var(--soft);border-radius:5px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--g);border-radius:5px;transition:width .3s}
.bar>i.warn{background:var(--amber)}
.bar>i.dang{background:var(--red)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:13.5px;padding:10px 16px;border-radius:var(--r);border:1.5px solid var(--bd2);background:#fff;color:var(--t1);font-weight:600}
.btn:active{background:var(--soft);transform:scale(.98)}
.btn-pri{background:var(--g);border-color:var(--g);color:#fff;box-shadow:0 2px 8px rgba(29,158,117,.3)}
.btn-pri:active{background:var(--gd)}
.btn-sm{padding:8px 13px;font-size:12.5px}
.btn-block{width:100%}
.btn-danger{color:var(--red-t);border-color:var(--red-bd);background:var(--red-bg)}
.btn-ghost{border-color:transparent;background:var(--soft)}

.mchart{display:flex;align-items:flex-end;gap:6px;height:160px;padding:8px 0}
.mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;justify-content:flex-end;height:100%}
.mcol .bb{width:74%;max-width:30px;background:linear-gradient(180deg,#34BC91,#0F6E56);border-radius:5px 5px 0 0;min-height:3px;transition:height .35s;position:relative}
.mcol .bb.cur{background:linear-gradient(180deg,#F0A93A,#D98612)}
.mcol .val{font-size:9.5px;color:var(--t2);font-weight:700}
.mcol .lb{font-size:10px;color:var(--t3)}

.abar{display:flex;align-items:center;gap:11px;padding:9px 0}
.abar .rk{width:20px;height:20px;border-radius:6px;background:var(--gl);color:var(--gd);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.abar .nm{font-size:13px;width:118px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.abar .tr{flex:1;height:24px;background:var(--soft);border-radius:7px;overflow:hidden}
.abar .tr>i{display:block;height:100%;background:linear-gradient(90deg,#34BC91,#0F6E56);border-radius:7px}
.abar .vv{font-size:12px;font-weight:700;width:78px;text-align:right;flex-shrink:0}

.modal{position:fixed;inset:0;background:rgba(16,30,26,.5);z-index:90;display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
@media(min-width:620px){ .modal{align-items:center} }
.sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:580px;max-height:93vh;overflow-y:auto;padding:0 18px 28px}
@media(min-width:620px){ .sheet{border-radius:20px} }
.sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:sticky;top:0;background:#fff;padding:18px 0 12px;z-index:2;border-bottom:1px solid var(--bd)}
.sheet-h h3{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.sheet-h h3 i{color:var(--g)}
.x{font-size:24px;color:var(--t3);line-height:1;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.x:active{background:var(--soft)}
.frm{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.fld{display:flex;flex-direction:column;gap:6px}
.fld.full{grid-column:1/-1}
.fld label{font-size:12.5px;color:var(--t2);font-weight:600}
.fld label .req{color:var(--red);margin-left:2px}
.fld input,.fld select,.fld textarea{font-size:15px;padding:11px 12px;border:1.5px solid var(--bd2);border-radius:var(--r);background:#fff;color:var(--t1);width:100%}
.fld textarea{min-height:66px;resize:vertical}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px var(--gl)}
.chk{display:flex;align-items:center;gap:9px;padding:11px 12px;border:1.5px solid var(--bd2);border-radius:var(--r);font-size:13.5px;font-weight:600;cursor:pointer}
.chk input{width:19px;height:19px;accent-color:var(--g)}
.chk.on{border-color:var(--g);background:var(--gl2)}
.seg{display:flex;gap:0;border:1.5px solid var(--bd2);border-radius:var(--r);overflow:hidden}
.seg button{flex:1;padding:10px;font-size:13.5px;font-weight:600;color:var(--t2);background:#fff;border-right:1.5px solid var(--bd2)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--g);color:#fff}
.frm-foot{display:flex;gap:9px;margin-top:20px}

.dl{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.dl .df{background:var(--soft);border-radius:var(--r);padding:11px 12px}
.dl .df.full{grid-column:1/-1}
.dl .df .k{font-size:11px;color:var(--t3);font-weight:600}
.dl .df .v{font-size:14px;font-weight:700;margin-top:3px}

.reco{background:var(--gl2);border:1.5px solid var(--gbd);border-radius:var(--r);padding:13px;margin-top:8px}
.reco-h{font-size:13px;font-weight:700;color:var(--gd);display:flex;align-items:center;gap:6px;margin-bottom:8px}
.reco .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px dashed var(--gbd);font-size:13px}
.reco .row:last-child{border-bottom:none}
.reco .row .rl{color:var(--t2);font-weight:600;flex-shrink:0}
.reco .row .rv{text-align:right}
.reco .row .rv b{color:var(--gd);font-weight:800}
.reco .row .rv small{display:block;color:var(--t3);font-size:11px;margin-top:1px}

.empty{text-align:center;padding:46px 16px;color:var(--t3);font-size:13.5px}
.empty i{font-size:40px;display:block;margin-bottom:10px;color:var(--bd2)}
.fab{position:fixed;right:16px;bottom:84px;width:56px;height:56px;border-radius:50%;background:linear-gradient(145deg,#27B187,#0F6E56);color:#fff;font-size:28px;box-shadow:0 8px 20px rgba(15,110,86,.45);z-index:35;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.93)}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#16201D;color:#fff;padding:12px 20px;border-radius:24px;font-size:13.5px;font-weight:600;z-index:200;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;box-shadow:var(--sh2)}
.toast.show{opacity:1}
.banner{border-radius:var(--r);padding:12px 14px;font-size:12.5px;margin-bottom:14px;display:flex;gap:9px;align-items:flex-start;line-height:1.5}
.banner.warn{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber-t)}
.banner.info{background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue-t)}
.banner i{font-size:18px;flex-shrink:0}
.banner b{font-weight:700}
.help-step{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--bd)}
.help-step:last-child{border-bottom:none}
.help-step .n{width:26px;height:26px;border-radius:50%;background:var(--g);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.help-step b{font-size:13.5px}
.help-step p{font-size:12.5px;color:var(--t2);margin-top:3px;line-height:1.5}
.help-step code{background:var(--soft);padding:1px 6px;border-radius:4px;font-size:11.5px;font-family:ui-monospace,monospace;word-break:break-all}
.mem{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--bd)}
.mem:last-child{border-bottom:none}
.mem .av{width:36px;height:36px;border-radius:50%;background:var(--gl);color:var(--gd);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.mem .info{flex:1}
.mem .info .nm{font-size:13.5px;font-weight:700}
.mem .info .rl{font-size:11.5px;color:var(--t3)}
.sec-label{font-size:12px;font-weight:700;color:var(--t2);margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.sec-label i{color:var(--g)}
.tb-menu{color:#fff;font-size:22px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;margin-right:4px;flex-shrink:0}
.tb-menu:active{background:rgba(255,255,255,.18)}
.drawer-ov{position:fixed;inset:0;background:rgba(16,30,26,.45);z-index:60;opacity:0;pointer-events:none;transition:opacity .22s}
.drawer-ov.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;left:0;bottom:0;width:80%;max-width:282px;background:#fff;z-index:61;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;box-shadow:6px 0 26px rgba(0,0,0,.24)}
.drawer.open{transform:translateX(0)}
.drawer-h{background:linear-gradient(135deg,#0F6E56,#1D9E75);color:#fff;padding:18px 16px;padding-top:max(18px,env(safe-area-inset-top))}
.drawer-h .lg{width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:10px}
.drawer-h b{font-size:15px;font-weight:700}
.drawer-h small{display:block;font-size:11.5px;opacity:.85;margin-top:2px}
.drawer-nav{display:flex;flex-direction:column;padding:8px 0;flex:1;overflow-y:auto}
.drawer-i{display:flex;align-items:center;gap:13px;padding:13px 16px;font-size:14.5px;font-weight:500;color:var(--t1);border-left:3px solid transparent;text-align:left;background:none}
.drawer-i i{font-size:20px;color:var(--t3);width:22px;text-align:center}
.drawer-i:active{background:var(--soft)}
.drawer-i.active{background:var(--gl2);color:var(--gd);font-weight:700;border-left-color:var(--g)}
.drawer-i.active i{color:var(--g)}
.drawer-i.lo{margin-top:auto;color:var(--red-t);border-top:1px solid var(--bd)}
.drawer-i.lo i{color:var(--red-t)}
/* 검색형 자동완성 드롭다운 */
.sb-pop{position:fixed;background:#fff;border:1px solid var(--bd2);border-radius:11px;box-shadow:0 10px 26px rgba(16,40,33,.22);max-height:248px;overflow-y:auto;z-index:120;display:none;-webkit-overflow-scrolling:touch}
.sb-item{padding:12px 13px;font-size:15px;border-bottom:1px solid var(--bd);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item:last-child{border-bottom:none}
.sb-item:active,.sb-item.hl{background:var(--gl2);color:var(--gd)}
.sb-item .meta{color:var(--t3);font-size:12px;margin-left:6px}
/* ===== 모바일 최적화: 폼을 1열로, 입력 16px(아이폰 확대 방지) ===== */
@media(max-width:600px){
  .frm{grid-template-columns:1fr;gap:12px}
  .dl{grid-template-columns:1fr;gap:9px}
  .sheet{padding:0 14px 26px;border-radius:20px 20px 0 0}
  .sheet-h{padding:16px 0 11px}
  .fld input,.fld select,.fld textarea,.modal input,.modal select,.modal textarea{font-size:16px;padding:12px 12px}
  .seg button{font-size:14px;padding:11px 6px}
  .frm-foot{position:sticky;bottom:0;background:#fff;padding:10px 0 4px;margin-top:14px;box-shadow:0 -6px 12px -8px rgba(0,0,0,.15)}
  .pat-row .in-pat-name{flex:1.4}
}
@media(max-width:380px){
  .seg button{font-size:13px}
  .stat .v{font-size:23px}
}
</style>
</head>
<body>
<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">
      <div class="ico"><i class="ti ti-diamond"></i></div>
      <h1>다우세라믹앤석재</h1>
      <p>자재 · 현장 통합관리 시스템</p>
    </div>
    <div id="login-form">
      <div class="lf-fld"><label>이메일</label><input id="lg-email" type="email" inputmode="email" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="이메일 주소"></div>
      <div class="lf-fld"><label>비밀번호</label><input id="lg-pw" type="password" autocomplete="current-password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <label class="lf-remember"><input type="checkbox" id="lg-remember">이메일 저장 · 이 기기에서 자동 로그인</label>
      <button class="btn btn-pri btn-block" style="margin-top:2px" onclick="doLogin()"><i class="ti ti-login"></i>로그인</button>
      <div class="login-err" id="login-err"></div>
      <button class="link-btn" onclick="resetPw()">비밀번호를 잊으셨나요?</button>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:6px;min-width:0">
      <button class="tb-menu" onclick="toggleDrawer()" aria-label="메뉴"><i class="ti ti-menu-2"></i></button>
      <div class="tb-logo">
        <div class="ico"><i class="ti ti-diamond"></i></div>
        <div>다우세라믹앤석재<small>통합관리 시스템</small></div>
      </div>
    </div>
    <div class="tb-right">
      <span class="sync-dot" id="sync"><span class="d"></span><span id="sync-t">실시간</span></span>
      <span class="tb-user"><span class="av" id="me-av"></span><span id="me-nm"></span></span>
    </div>
  </div>

  <div class="drawer-ov" id="drawer-ov" onclick="closeDrawer()"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-h">
      <div class="lg"><i class="ti ti-diamond"></i></div>
      <b id="dw-name">사용자</b><small id="dw-role"></small>
    </div>
    <nav class="drawer-nav">
      <button class="drawer-i active" data-tab="home" onclick="goD('home')"><i class="ti ti-home-2"></i>홈</button>
      <button class="drawer-i" data-tab="sites" onclick="goD('sites')"><i class="ti ti-building-community"></i>현장</button>
      <button class="drawer-i" data-tab="stock" onclick="goD('stock')"><i class="ti ti-packages"></i>재고 · 입고</button>
      <button class="drawer-i" data-tab="ship" onclick="goD('ship')"><i class="ti ti-truck-delivery"></i>출고</button>
      <button class="drawer-i" data-tab="hold" onclick="goD('hold')"><i class="ti ti-lock"></i>홀딩</button>
      <button class="drawer-i" data-tab="settings" onclick="goD('settings')"><i class="ti ti-settings"></i>설정</button>
      <button class="drawer-i lo" onclick="logout()"><i class="ti ti-logout"></i>로그아웃</button>
    </nav>
  </aside>

  <div class="wrap">
    <div class="page active" id="pg-home"></div>
    <div class="page" id="pg-sites"></div>
    <div class="page" id="pg-stock"></div>
    <div class="page" id="pg-ship"></div>
    <div class="page" id="pg-hold"></div>
    <div class="page" id="pg-settings"></div>
  </div>

  <button class="fab" id="fab" onclick="fabAction()" aria-label="추가">+</button>

  <nav class="botnav">
    <button class="nav-i active" data-tab="home" onclick="go('home')"><i class="ti ti-home-2"></i>홈</button>
    <button class="nav-i" data-tab="sites" onclick="go('sites')"><i class="ti ti-building-community"></i>현장</button>
    <button class="nav-i" data-tab="stock" onclick="go('stock')"><i class="ti ti-packages"></i>재고·입고</button>
    <button class="nav-i" data-tab="ship" onclick="go('ship')"><i class="ti ti-truck-delivery"></i>출고</button>
    <button class="nav-i" data-tab="hold" onclick="go('hold')"><i class="ti ti-lock-square-rounded"></i>홀딩</button>
    <button class="nav-i" data-tab="settings" onclick="go('settings')"><i class="ti ti-settings"></i>설정</button>
  </nav>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
/* 옛 서비스워커/캐시 정리 — 구버전이 캐시로 뜨는 것 방지 */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
  if (window.caches && caches.keys) caches.keys().then(ks => ks.forEach(k => caches.delete(k)));
}
</script>
<!-- Firebase 설정: 같은 폴더의 firebase-config.js 가 window.FIREBASE_CONFIG 를 설정.
     파일이 없으면 이 기기에만 저장되는 미리보기 모드로 동작합니다. -->
<script src="firebase-config.js"></script>
<script>document.write('<scr' + 'ipt src="app.js?t=' + Date.now() + '"></scr' + 'ipt>');</script>
</body>
</html>
